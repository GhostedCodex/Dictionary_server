<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
        }

        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        main {
            max-width: 900px;
            margin: 20px auto;
            padding: 10px;
        }

        section {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        input,
        textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        button {
            padding: 8px 15px;
            margin-right: 5px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table,
        th,
        td {
            border: 1px solid #ccc;
        }

        th,
        td {
            padding: 8px;
            text-align: left;
        }

        .result {
            padding: 10px;
            background: #eee;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <header>
        <h2>Dictionary App</h2>
        <p id="status">Connecting...</p>
    </header>

    <main>

        <!-- Search -->
        <section>
            <h3>Search Word</h3>
            <input type="text" id="search-input" placeholder="Enter word">
            <button onclick="searchWord()">Search</button>
            <button onclick="clearSearch()">Clear</button>

            <div class="result" id="search-result">Result will appear here</div>
        </section>

        <!-- Add -->
        <section>
            <h3>Add Word</h3>
            <input type="text" id="word" placeholder="Word">
            <textarea id="definition" placeholder="Definition"></textarea>
            <button onclick="addWord()">Add</button>
        </section>

        <!-- Entries -->
        <section>
            <h3>All Words</h3>
            <input type="text" placeholder="Filter..." oninput="filterTable(this.value)">

            <table>
                <thead>
                    <tr>
                        <th>Word</th>
                        <th>Definition</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td colspan="3">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>

    <script>
        const API = "";
        let allEntries = [];

        // Load entries
        async function loadEntries() {
            const res = await fetch(API + "/api/entries");
            const data = await res.json();

            if (!res.ok) {
                document.getElementById("status").textContent = "Server offline";
                return;
            }

            document.getElementById("status").textContent = "Online";
            allEntries = data.entries || [];
            renderTable(allEntries);
        }

        // Render table
        function renderTable(entries) {
            const body = document.getElementById("table-body");

            if (!entries.length) {
                body.innerHTML = "<tr><td colspan='3'>No data</td></tr>";
                return;
            }

            body.innerHTML = entries.map(e => `
        <tr>
            <td>${e.word}</td>
            <td>${e.definition}</td>
            <td>
                <button onclick="deleteWord('${e.word}')">Delete</button>
            </td>
        </tr>
    `).join("");
        }

        // Filter
        function filterTable(q) {
            const text = q.toLowerCase();
            renderTable(allEntries.filter(e =>
                e.word.toLowerCase().includes(text) ||
                e.definition.toLowerCase().includes(text)
            ));
        }

        // Search
        async function searchWord() {
            const word = document.getElementById("search-input").value.trim();
            if (!word) return;

            const res = await fetch(`/api/search?word=${word}`);
            const data = await res.json();

            const box = document.getElementById("search-result");

            if (res.status === 404) {
                box.textContent = "Word not found";
            } else {
                box.textContent = data.definition;
                loadEntries();
            }
        }

        function clearSearch() {
            document.getElementById("search-input").value = "";
            document.getElementById("search-result").textContent = "";
        }

        // Add
        async function addWord() {
            const word = document.getElementById("word").value.trim();
            const def = document.getElementById("definition").value.trim();

            if (!word || !def) return alert("Fill all fields");

            const res = await fetch("/api/add", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ word, definition: def })
            });

            if (res.ok) {
                alert("Added");
                document.getElementById("word").value = "";
                document.getElementById("definition").value = "";
                loadEntries();
            }
        }

        // Delete
        async function deleteWord(word) {
            const res = await fetch("/api/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ word })
            });

            if (res.ok) {
                loadEntries();
            }
        }

        // Init
        loadEntries();
    </script>

</body>

</html>
