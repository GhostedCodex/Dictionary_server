<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary Server</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #141414;
            --border: #232323;
            --muted: #3a3a3a;
            --text: #e8e8e2;
            --text-dim: #6b6b65;
            --accent: #c8f060;
            --accent-dim: #7a9438;
            --red: #f06060;
            --amber: #f0b860;
            --mono: 'DM Mono', monospace;
            --sans: 'DM Sans', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 14px;
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr auto;
        }

        /* ── Header ── */
        header {
            border-bottom: 1px solid var(--border);
            padding: 20px 32px;
            display: flex;
            align-items: baseline;
            gap: 16px;
        }

        header h1 {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
        }

        header .status {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }

        .dot.offline {
            background: var(--red);
            animation: none;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        #entry-count {
            color: var(--text-dim);
            margin-left: auto;
            font-family: var(--mono);
            font-size: 11px;
        }

        /* ── Layout ── */
        main {
            display: grid;
            grid-template-columns: 360px 1fr;
            height: calc(100vh - 62px - 36px);
            overflow: hidden;
        }

        /* ── Left panel ── */
        .panel {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-section {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .panel-label {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 14px;
        }

        /* ── Inputs ── */
        .field {
            margin-bottom: 10px;
        }

        .field label {
            display: block;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            padding: 9px 12px;
            outline: none;
            transition: border-color 0.15s;
            resize: none;
        }

        input[type="text"]:focus,
        textarea:focus {
            border-color: var(--muted);
        }

        /* ── Buttons ── */
        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        button {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 8px 16px;
            border-radius: 4px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: opacity 0.15s, background 0.15s;
            flex: 1;
        }

        button:active {
            opacity: 0.75;
        }

        .btn-primary {
            background: var(--accent);
            color: #0d0d0d;
            border-color: var(--accent);
            font-weight: 500;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-dim);
            border-color: var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--muted);
            color: var(--text);
        }

        .btn-danger {
            background: transparent;
            color: var(--red);
            border-color: #3a1a1a;
        }

        .btn-danger:hover {
            border-color: var(--red);
        }

        /* ── Result box ── */
        .result-box {
            margin-top: 12px;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid var(--border);
            font-family: var(--mono);
            font-size: 12px;
            line-height: 1.6;
            min-height: 48px;
            background: var(--surface);
            color: var(--text-dim);
            transition: all 0.2s;
        }

        .result-box.found {
            border-color: var(--accent-dim);
            color: var(--text);
        }

        .result-box.error {
            border-color: #3a1a1a;
            color: var(--red);
        }

        .result-box.success {
            border-color: var(--accent-dim);
            color: var(--accent);
        }

        /* ── Entry list ── */
        .entries-header {
            padding: 16px 24px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .entries-header .panel-label {
            margin-bottom: 0;
        }

        #filter-input {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 11px;
            padding: 5px 10px;
            outline: none;
            width: 140px;
            margin-left: auto;
            transition: border-color 0.15s;
        }

        #filter-input:focus {
            border-color: var(--muted);
        }

        #filter-input::placeholder {
            color: var(--text-dim);
        }

        /* ── Right panel: table ── */
        .table-wrap {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--muted) transparent;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--mono);
            font-size: 12px;
        }

        thead th {
            position: sticky;
            top: 0;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            text-align: left;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-dim);
            font-weight: 400;
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
            cursor: pointer;
        }

        tbody tr:hover {
            background: var(--surface);
        }

        tbody tr.selected {
            background: #1a1f0f;
        }

        tbody td {
            padding: 10px 16px;
            vertical-align: top;
            line-height: 1.5;
        }

        .td-word {
            color: var(--accent);
            font-weight: 500;
            white-space: nowrap;
            width: 130px;
        }

        .td-def {
            color: var(--text);
            max-width: 300px;
        }

        .td-ts {
            color: var(--text-dim);
            white-space: nowrap;
            font-size: 11px;
        }

        .td-null {
            color: var(--muted);
            font-style: italic;
        }

        .td-action {
            width: 40px;
            text-align: right;
        }

        .del-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            border-radius: 3px;
            flex: unset;
            transition: color 0.15s;
            letter-spacing: 0;
            text-transform: none;
        }

        .del-btn:hover {
            color: var(--red);
        }

        .empty-state {
            padding: 48px 24px;
            text-align: center;
            color: var(--text-dim);
            font-family: var(--mono);
            font-size: 12px;
        }

        /* ── Footer ── */
        footer {
            border-top: 1px solid var(--border);
            padding: 10px 32px;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 0.08em;
            display: flex;
            gap: 24px;
        }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 48px;
            left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: 11px;
            padding: 10px 20px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #toast.err {
            border-color: #3a1a1a;
            color: var(--red);
        }

        /* ── Spinner ── */
        .spinner {
            display: inline-block;
            width: 10px;
            height: 10px;
            border: 1px solid var(--muted);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>dict_server</h1>
        <div class="status">
            <span class="dot" id="status-dot"></span>
            <span id="status-text">connecting…</span>
        </div>
        <span id="entry-count"></span>
    </header>

    <main>
        <!-- Left panel -->
        <div class="panel">

            <!-- Search -->
            <div class="panel-section">
                <div class="panel-label">Search</div>
                <div class="field">
                    <input type="text" id="search-input" placeholder="enter a word…" autocomplete="off">
                </div>
                <div class="btn-row">
                    <button class="btn-primary" onclick="doSearch()">Search</button>
                    <button class="btn-secondary" onclick="clearSearch()">Clear</button>
                </div>
                <div class="result-box" id="search-result">—</div>
            </div>

            <!-- Add -->
            <div class="panel-section">
                <div class="panel-label">Add / Update</div>
                <div class="field">
                    <label>Word</label>
                    <input type="text" id="add-word" placeholder="word" autocomplete="off">
                </div>
                <div class="field">
                    <label>Definition</label>
                    <textarea id="add-def" rows="3" placeholder="definition…"></textarea>
                </div>
                <div class="btn-row">
                    <button class="btn-primary" onclick="doAdd()">Add</button>
                </div>
            </div>

        </div>

        <!-- Right panel: entry table -->
        <div style="display:flex;flex-direction:column;overflow:hidden;">
            <div class="entries-header">
                <span class="panel-label">All entries</span>
                <input type="text" id="filter-input" placeholder="filter…" oninput="filterTable(this.value)">
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Word</th>
                            <th>Definition</th>
                            <th>Added</th>
                            <th>Updated</th>
                            <th>Last searched</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="entries-body">
                        <tr>
                            <td colspan="6" class="empty-state">Loading…</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer>
        <span id='footer-tcp'>TCP → loading…</span>
        <span id='footer-http'>HTTP → loading…</span>
        <span id="last-refresh">—</span>
    </footer>

    <div id="toast"></div>

    <script>
        const API = '';   // same origin

        // ── Utilities ─────────────────────────────────────────────────────────────

        function fmt(iso) {
            if (!iso) return null;
            const d = new Date(iso);
            return d.toLocaleString(undefined, {
                month: 'short', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
            });
        }

        let toastTimer;
        function toast(msg, isErr = false) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'show' + (isErr ? ' err' : '');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { el.className = ''; }, 2500);
        }

        async function api(method, path, body) {
            const opts = { method, headers: {} };
            if (body) {
                opts.body = JSON.stringify(body);
                opts.headers['Content-Type'] = 'application/json';
            }
            const r = await fetch(API + path, opts);
            return { ok: r.ok, status: r.status, data: await r.json() };
        }

        // ── Load entries ──────────────────────────────────────────────────────────

        let allEntries = [];

        async function loadEntries() {
            const { ok, data } = await api('GET', '/api/entries');
            const dot = document.getElementById('status-dot');
            const stxt = document.getElementById('status-text');

            if (!ok) {
                dot.className = 'dot offline';
                stxt.textContent = 'server offline';
                document.getElementById('entries-body').innerHTML =
                    `<tr><td colspan="6" class="empty-state">Cannot reach dictionary server.</td></tr>`;
                return;
            }

            dot.className = 'dot';
            stxt.textContent = 'online';

            allEntries = data.entries || [];
            document.getElementById('entry-count').textContent =
                `${allEntries.length} entr${allEntries.length === 1 ? 'y' : 'ies'}`;
            document.getElementById('last-refresh').textContent =
                'refreshed ' + new Date().toLocaleTimeString();

            renderTable(allEntries);
        }

        function renderTable(entries) {
            const tbody = document.getElementById('entries-body');
            if (!entries.length) {
                tbody.innerHTML = `<tr><td colspan="6" class="empty-state">No entries found.</td></tr>`;
                return;
            }
            tbody.innerHTML = entries.map(e => `
      <tr onclick="selectWord('${e.word}')">
        <td class="td-word">${e.word}</td>
        <td class="td-def">${e.definition}</td>
        <td class="td-ts">${fmt(e.added_at) ?? '<span class="td-null">—</span>'}</td>
        <td class="td-ts">${fmt(e.updated_at) ?? '<span class="td-null">—</span>'}</td>
        <td class="td-ts">${fmt(e.last_searched_at) ?? '<span class="td-null">never</span>'}</td>
        <td class="td-action">
          <button class="del-btn" onclick="event.stopPropagation();doDelete('${e.word}')" title="delete">✕</button>
        </td>
      </tr>`).join('');
        }

        function filterTable(q) {
            const lower = q.toLowerCase();
            renderTable(allEntries.filter(e =>
                e.word.includes(lower) || e.definition.toLowerCase().includes(lower)
            ));
        }

        // ── Search ────────────────────────────────────────────────────────────────

        async function doSearch() {
            const word = document.getElementById('search-input').value.trim();
            if (!word) return;

            const box = document.getElementById('search-result');
            box.className = 'result-box';
            box.innerHTML = '<span class="spinner"></span>searching…';

            const { ok, status, data } = await api('GET', `/api/search?word=${encodeURIComponent(word)}`);

            if (status === 404) {
                box.className = 'result-box error';
                box.textContent = `"${word}" not found`;
            } else if (!ok) {
                box.className = 'result-box error';
                box.textContent = data.error || 'error';
            } else {
                box.className = 'result-box found';
                box.textContent = data.definition;
                loadEntries();   // refresh to show updated last_searched_at
            }
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            const box = document.getElementById('search-result');
            box.className = 'result-box';
            box.textContent = '—';
        }

        function selectWord(word) {
            document.getElementById('search-input').value = word;
            doSearch();
        }

        // ── Add ───────────────────────────────────────────────────────────────────

        async function doAdd() {
            const word = document.getElementById('add-word').value.trim();
            const def = document.getElementById('add-def').value.trim();
            if (!word || !def) { toast('Word and definition are required', true); return; }

            const { ok, data } = await api('POST', '/api/add', { word, definition: def });
            if (ok) {
                toast(`"${word}" saved`);
                document.getElementById('add-word').value = '';
                document.getElementById('add-def').value = '';
                loadEntries();
            } else {
                toast(data.error || 'failed to add', true);
            }
        }

        // ── Delete ────────────────────────────────────────────────────────────────

        async function doDelete(word) {
            const { ok, data } = await api('POST', '/api/delete', { word });
            if (ok) {
                toast(`"${word}" deleted`);
                loadEntries();
            } else {
                toast(data.error || 'failed to delete', true);
            }
        }

        // ── Keyboard shortcuts ────────────────────────────────────────────────────

        document.getElementById('search-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') doSearch();
        });
        document.getElementById('add-word').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('add-def').focus();
        });

        // ── Init ──────────────────────────────────────────────────────────────────

        loadEntries();
        setInterval(loadEntries, 10000);   // auto-refresh every 10s

        // Populate footer with actual server IP
        fetch('/api/info').then(r => r.json()).then(d => {
            document.getElementById('footer-tcp').textContent = `TCP → ${d.server_ip}:${d.dict_port}`;
            document.getElementById('footer-http').textContent = `HTTP → ${d.server_ip}:${d.ui_port}`;
        }).catch(() => { });
    </script>
</body>

</html>
